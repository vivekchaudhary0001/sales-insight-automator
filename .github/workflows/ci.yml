name: CI — Build & Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ── Backend ────────────────────────────────────────────────────────────────
  backend-lint-test:
    name: Backend · Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest httpx

      - name: Lint with Ruff
        working-directory: backend
        run: ruff check app/ --select E,W,F --ignore E501

      - name: Run smoke tests
        working-directory: backend
        env:
          GEMINI_API_KEY: ""
          GROQ_API_KEY: ""
          SMTP_USER: ""
          SMTP_PASSWORD: ""
        run: |
          python -c "from app.main import app; print('FastAPI app import OK')"
          python -c "from app.services.parser import parse_file; print('Parser import OK')"
          python -c "from app.services.ai_engine import generate_summary; print('AI engine import OK')"

  # ── Docker Build ───────────────────────────────────────────────────────────
  backend-docker:
    name: Backend · Docker Build
    runs-on: ubuntu-latest
    needs: backend-lint-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: sia-backend:pr-${{ github.event.pull_request.number || 'main' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend-lint-build:
    name: Frontend · Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint || true  # non-blocking on PR; tighten for main

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: https://api.example.com/api/v1
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  frontend-docker:
    name: Frontend · Docker Build
    runs-on: ubuntu-latest
    needs: frontend-lint-build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: sia-frontend:pr-${{ github.event.pull_request.number || 'main' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Summary ────────────────────────────────────────────────────────────────
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [backend-lint-test, backend-docker, frontend-lint-build, frontend-docker]
    if: always()

    steps:
      - name: Check all jobs
        run: |
          echo "Backend Lint: ${{ needs.backend-lint-test.result }}"
          echo "Backend Docker: ${{ needs.backend-docker.result }}"
          echo "Frontend Build: ${{ needs.frontend-lint-build.result }}"
          echo "Frontend Docker: ${{ needs.frontend-docker.result }}"
          if [[ "${{ needs.backend-lint-test.result }}" == "failure" || \
                "${{ needs.backend-docker.result }}" == "failure" || \
                "${{ needs.frontend-lint-build.result }}" == "failure" || \
                "${{ needs.frontend-docker.result }}" == "failure" ]]; then
            echo "❌ CI failed — block merge"
            exit 1
          fi
          echo "✅ All checks passed"
